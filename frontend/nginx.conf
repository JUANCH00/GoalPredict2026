# Configuración Nginx para servir la SPA de GoalPredict 2026 + reverse proxy
# del API al backend FastAPI en docker-compose.
#
# En dev usábamos el proxy de Vite. En prod nginx hace lo mismo: cualquier
# request a /api/* se reenvía al servicio `backend` (resuelto por DNS dentro
# de la network de docker-compose). Esto evita CORS porque el browser ve
# todo bajo el mismo origin que sirve el HTML.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para HTML/CSS/JS — reduce el payload ~70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Cache largo para assets versionados (Vite les pone un hash)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse proxy del API al backend
    # Dentro de la network de docker-compose, "backend" es el nombre del
    # servicio y resuelve a su IP interna.
    location /api/ {
        proxy_pass http://backend:8765/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts más generosos para predicciones lentas
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # SPA fallback — todas las rutas no-API caen en index.html
    # para que React Router maneje el routing del lado del cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck simple: si nginx responde, está vivo
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
